<!DOCTYPE html>
<html>
<head>
  <title>Изменение цвета фона</title>
  <style>
    *{
      margin: 0;
      padding: 0;
    }

    .toggle-checkbox{
      position: relative;
    }

    .page {
      position: fixed;
      width: 100%;
      height: 100%;
      background-color: rgb(100, 77, 77);
      transition: background-color 0.5s;
    }

    .toggle-checkbox:checked + .page{
      background-color: lightblue;
    }
    
  </style>
</head>
<body>
  <input type="checkbox" class="toggle-checkbox">
  <div class="page"></div>
</body>
</html>
